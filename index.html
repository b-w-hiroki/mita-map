<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
  <title>三田・田町マップ</title>
  <style>
/* ═══ テーマ ═══════════════════════════════ */
:root {
  --lunch:#f59e2b; --dinner:#ef4444; --izakaya:#a855f7;
  --bar:#06b6d4; --cafe:#22c55e;
  --conv:#ff7043; --super:#26a69a; --drug:#7e57c2;
  --accent:#e8935a;
}
[data-theme="light"] { --bg:#f0f0eb; --sf:#ffffff; --sf2:#f5f5f0; --bd:#ddddd5; --tx:#1a1a2e; --tx2:#77779a; --sh:rgba(0,0,0,.10); }
[data-theme="dark"]  { --bg:#0f0f13; --sf:#1a1a24; --sf2:#22222f; --bd:#2e2e3e; --tx:#eeeef2; --tx2:#8888a8; --sh:rgba(0,0,0,.55); }

/* ═══ リセット ════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; font-family:'Hiragino Sans','Meiryo',sans-serif; background:var(--bg); color:var(--tx); overflow:hidden; }
body { display:flex; flex-direction:column; }
button { cursor:pointer; font-family:inherit; }
a { color:inherit; }

/* ═══ Header ═══════════════════════════════ */
header {
  display:flex; align-items:center; gap:8px; flex-wrap:nowrap;
  padding:9px 14px; background:var(--sf); border-bottom:1px solid var(--bd);
  flex-shrink:0; z-index:200;
}
.hd-logo { flex-shrink:0; }
.hd-title { flex:1; min-width:0; }
.hd-title h1 { font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.2; }
.hd-title h1 span { color:var(--accent); }
.hd-title small { font-size:10px; color:var(--tx2); display:block; }
.mode-toggle { display:flex; gap:3px; flex-shrink:0; }
.mode-btn { padding:5px 9px; border-radius:13px; border:1px solid var(--bd); background:transparent; color:var(--tx2); font-size:11px; transition:all .18s; white-space:nowrap; }
.mode-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
.icon-btn { width:32px; height:32px; border-radius:50%; border:1px solid var(--bd); background:var(--sf2); color:var(--tx); font-size:14px; display:flex; align-items:center; justify-content:center; transition:all .18s; flex-shrink:0; }
.icon-btn:hover { border-color:var(--accent); }
#visibleCount { font-size:11px; color:var(--tx2); white-space:nowrap; flex-shrink:0; }

/* ═══ フィルターエリア ══════════════════════ */
.filter-area { flex-shrink:0; background:var(--sf); border-bottom:1px solid var(--bd); }
.filter-row { display:flex; align-items:center; gap:5px; padding:6px 12px; overflow-x:auto; scrollbar-width:none; }
.filter-row::-webkit-scrollbar { display:none; }
.filter-row+.filter-row { border-top:1px solid var(--bd); }
.filter-label { font-size:10px; color:var(--tx2); white-space:nowrap; font-weight:600; flex-shrink:0; }
.f-btn { display:flex; align-items:center; gap:4px; padding:4px 10px; border-radius:13px; border:1px solid var(--bd); background:transparent; color:var(--tx2); font-size:11px; white-space:nowrap; transition:all .18s; }
.f-btn .dot { width:6px; height:6px; border-radius:50%; }
.f-btn:hover { border-color:var(--accent); color:var(--tx); }
.f-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
.f-btn.active .dot { background:rgba(255,255,255,.6); }

/* ═══ メインレイアウト ══════════════════════ */
.main { flex:1; display:flex; overflow:hidden; min-height:0; }
#map { flex:1; min-width:0; min-height:0; }

/* ═══ サイドバー ════════════════════════════ */
.sidebar {
  width:340px; flex-shrink:0; min-height:0;
  position:relative; overflow:hidden;
  background:var(--sf); border-left:1px solid var(--bd);
  display:flex; flex-direction:column;
}
.sidebar-pane {
  position:absolute; inset:0; min-height:0;
  display:flex; flex-direction:column;
  background:var(--sf);
  transition:transform .28s cubic-bezier(.25,.8,.25,1);
  will-change:transform;
}
.list-pane   { transform:translateX(0); }
.list-pane.out { transform:translateX(-100%); }
.detail-pane { transform:translateX(100%); }
.detail-pane.in { transform:translateX(0); }

.pane-header { display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid var(--bd); flex-shrink:0; }
.pane-header strong { font-size:13px; }
.pane-header span { font-size:11px; color:var(--tx2); }
.pane-scroll { flex:1; overflow-y:auto; min-height:0; scrollbar-width:thin; scrollbar-color:var(--bd) transparent; }

/* ═══ カード ════════════════════════════════ */
.card-list { padding:8px; display:flex; flex-direction:column; gap:6px; }
.card {
  background:var(--sf2); border:1px solid var(--bd); border-radius:10px;
  padding:10px 11px 10px 13px;
  cursor:pointer; transition:border-color .15s, box-shadow .15s, transform .15s;
  position:relative; overflow:hidden;
}
.card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:3px 0 0 3px; }
.card[data-cat="lunch"]::before   { background:var(--lunch); }
.card[data-cat="dinner"]::before  { background:var(--dinner); }
.card[data-cat="izakaya"]::before { background:var(--izakaya); }
.card[data-cat="bar"]::before     { background:var(--bar); }
.card[data-cat="cafe"]::before    { background:var(--cafe); }
.card[data-cat="conv"]::before    { background:var(--conv); }
.card[data-cat="super"]::before   { background:var(--super); }
.card[data-cat="drug"]::before    { background:var(--drug); }
.card:hover { border-color:var(--accent); transform:translateY(-1px); box-shadow:0 3px 8px var(--sh); }
.card.active { border-color:var(--accent); }
.card-row1 { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; margin-bottom:2px; }
.card-name { font-size:13px; font-weight:700; line-height:1.3; }
.card-badges { display:flex; align-items:center; gap:3px; flex-shrink:0; }
.visit-badge { font-size:10px; background:rgba(232,147,90,.16); color:var(--accent); border-radius:8px; padding:1px 5px; font-weight:700; }
.fav-icon { font-size:13px; color:var(--bd); line-height:1; }
.fav-icon.on { color:var(--accent); }
.card-genre-tag { display:inline-block; font-size:10px; border:1px solid var(--bd); border-radius:4px; padding:1px 5px; color:var(--tx2); background:var(--bg); margin-bottom:4px; }
.card-desc { font-size:11px; color:var(--tx2); line-height:1.5; margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card-footer { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.price-tag { font-size:11px; font-weight:700; color:var(--accent); }
.cat-badge { font-size:10px; padding:1px 5px; border-radius:7px; font-weight:600; }
.cat-badge.lunch   { background:rgba(245,158,43,.13); color:var(--lunch); }
.cat-badge.dinner  { background:rgba(239,68,68,.13);  color:var(--dinner); }
.cat-badge.izakaya { background:rgba(168,85,247,.13); color:var(--izakaya); }
.cat-badge.bar     { background:rgba(6,182,212,.13);  color:var(--bar); }
.cat-badge.cafe    { background:rgba(34,197,94,.13);  color:var(--cafe); }
.cat-badge.conv    { background:rgba(255,112,67,.13); color:var(--conv); }
.cat-badge.super   { background:rgba(38,166,154,.13); color:var(--super); }
.cat-badge.drug    { background:rgba(126,87,194,.13); color:var(--drug); }
.stars-sm { color:#f59e0b; font-size:10px; }
.walk-sm  { font-size:10px; color:var(--tx2); margin-left:auto; }

/* ═══ 詳細パネル ════════════════════════════ */
.fav-btn { margin-left:auto; font-size:18px; background:none; border:none; color:var(--bd); transition:color .18s; padding:0 2px; }
.fav-btn.on { color:var(--accent); }
.detail-photo { width:100%; height:170px; object-fit:cover; display:block; background:var(--bd); }
.detail-body { padding:14px 15px; }
.detail-name { font-size:18px; font-weight:800; margin-bottom:5px; line-height:1.3; }
.detail-meta { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
.detail-genre { font-size:11px; border:1px solid var(--bd); border-radius:5px; padding:2px 6px; color:var(--tx2); }
.detail-price { font-size:14px; font-weight:700; color:var(--accent); }
.detail-stars { color:#f59e0b; font-size:13px; }
.sec-label { font-size:10px; font-weight:700; color:var(--tx2); letter-spacing:.08em; text-transform:uppercase; margin:13px 0 5px; }
.recommend-box { font-size:12px; line-height:1.75; background:var(--sf2); border-left:3px solid var(--accent); border-radius:0 8px 8px 0; padding:9px 11px; color:var(--tx); }
.info-row { display:flex; align-items:flex-start; gap:7px; font-size:12px; padding:5px 0; border-bottom:1px solid var(--bd); }
.info-row:last-child { border-bottom:none; }
.info-ico { width:16px; text-align:center; flex-shrink:0; line-height:1.6; }
.info-lbl { color:var(--tx2); width:60px; flex-shrink:0; line-height:1.6; }
.info-val { color:var(--tx); flex:1; line-height:1.6; }
.walk-chip { display:inline-flex; align-items:center; gap:3px; background:rgba(232,147,90,.11); color:var(--accent); border-radius:14px; padding:2px 8px; font-size:11px; font-weight:700; }
.action-btns { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:14px; }
.act-btn {
  display:flex; align-items:center; justify-content:center; gap:5px;
  padding:10px 6px; border-radius:9px; font-size:12px; font-weight:700;
  text-decoration:none; border:none; transition:all .18s; cursor:pointer;
}
.act-btn-primary  { background:var(--accent); color:#fff; }
.act-btn-secondary { background:var(--sf2); border:1px solid var(--bd); color:var(--tx); }
.act-btn-route    { background:var(--sf2); border:1px solid var(--bd); color:var(--tx); }
.act-btn-route.active { background:rgba(232,147,90,.13); border-color:var(--accent); color:var(--accent); }
.act-btn:hover { opacity:.82; }
.gmaps-link { display:flex; align-items:center; justify-content:center; gap:4px; margin-top:6px; font-size:11px; color:var(--tx2); text-decoration:none; padding:5px; border-radius:7px; transition:color .18s; }
.gmaps-link:hover { color:var(--accent); }
.route-info { font-size:11px; color:var(--accent); font-weight:600; text-align:center; margin-top:4px; min-height:16px; }

/* 訪問履歴 */
.visit-empty { font-size:12px; color:var(--tx2); padding:6px 0; }
.visit-item { padding:8px 0; border-bottom:1px solid var(--bd); }
.visit-item:last-child { border-bottom:none; }
.visit-item-head { display:flex; align-items:center; gap:6px; margin-bottom:2px; }
.visit-date  { font-size:11px; font-weight:700; color:var(--accent); }
.visit-stars { color:#f59e0b; font-size:11px; }
.visit-food  { font-size:12px; color:var(--tx); font-weight:600; }
.visit-memo  { font-size:11px; color:var(--tx2); line-height:1.5; margin-top:2px; }
.del-btn { margin-left:auto; font-size:12px; color:var(--tx2); background:none; border:none; padding:0 3px; }
.del-btn:hover { color:#ef4444; }

/* ═══ モーダル共通 ═══════════════════════════ */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--sf); border:1px solid var(--bd); border-radius:16px;
  width:92%; max-width:420px; max-height:90vh;
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:0 8px 32px var(--sh);
}
.modal-head { display:flex; align-items:center; padding:13px 15px; border-bottom:1px solid var(--bd); flex-shrink:0; }
.modal-head h3 { flex:1; font-size:14px; font-weight:700; }
.modal-close { background:none; border:none; font-size:20px; color:var(--tx2); padding:0 2px; line-height:1; }
.modal-body { padding:14px; overflow-y:auto; display:flex; flex-direction:column; gap:11px; }
.form-label { font-size:11px; font-weight:700; color:var(--tx2); display:block; margin-bottom:4px; }
.form-input, .form-textarea {
  width:100%; padding:8px 10px;
  background:var(--sf2); border:1px solid var(--bd); border-radius:8px;
  color:var(--tx); font-size:13px; font-family:inherit; transition:border-color .18s;
}
.form-input:focus, .form-textarea:focus { outline:none; border-color:var(--accent); }
.form-textarea { min-height:65px; resize:vertical; }
.star-picker { display:flex; gap:5px; }
.star-picker button { background:none; border:none; font-size:24px; color:var(--bd); transition:color .12s; padding:0; }
.star-picker button.lit { color:#f59e0b; }
.modal-foot { display:flex; gap:7px; padding:11px 14px; border-top:1px solid var(--bd); flex-shrink:0; }
.btn-cancel { flex:1; padding:9px; border-radius:8px; border:1px solid var(--bd); background:var(--sf2); color:var(--tx); font-size:13px; font-weight:600; }
.btn-save   { flex:1; padding:9px; border-radius:8px; border:none; background:var(--accent); color:#fff; font-size:13px; font-weight:700; }
.btn-cancel:hover, .btn-save:hover { opacity:.84; }

/* 設定モーダル追加スタイル */
.search-row { display:flex; gap:6px; }
.search-row .form-input { flex:1; }
.btn-search { padding:8px 12px; border-radius:8px; border:none; background:var(--accent); color:#fff; font-size:12px; font-weight:700; white-space:nowrap; }
.search-results { display:flex; flex-direction:column; gap:4px; margin-top:5px; }
.sr-item { padding:8px 10px; background:var(--sf2); border:1px solid var(--bd); border-radius:7px; cursor:pointer; transition:border-color .15s; }
.sr-item:hover { border-color:var(--accent); }
.sr-item-name { font-size:12px; font-weight:600; color:var(--tx); }
.sr-item-addr { font-size:10px; color:var(--tx2); margin-top:2px; line-height:1.4; }
.base-status { background:var(--sf2); border:1px solid var(--bd); border-radius:8px; padding:9px 11px; font-size:12px; }
.base-status-name { font-weight:700; color:var(--tx); }
.base-status-coord { font-size:10px; color:var(--tx2); margin-top:2px; }
.btn-geo { width:100%; padding:9px; border-radius:8px; border:1px solid var(--bd); background:var(--sf2); color:var(--tx); font-size:12px; font-weight:600; transition:all .18s; }
.btn-geo:hover { border-color:var(--accent); color:var(--accent); }
.search-loading { font-size:12px; color:var(--tx2); text-align:center; padding:8px 0; }

/* ═══ Leaflet カスタム ══════════════════════ */
.leaflet-popup-content-wrapper { background:var(--sf); border:1px solid var(--bd); border-radius:10px; box-shadow:0 4px 16px var(--sh); color:var(--tx); }
.leaflet-popup-content { margin:10px 12px; }
.leaflet-popup-tip { background:var(--sf); }
.leaflet-popup-close-button { color:var(--tx2) !important; font-size:17px !important; top:5px !important; right:5px !important; }
.leaflet-control-zoom a { background:var(--sf) !important; color:var(--tx) !important; border-color:var(--bd) !important; }
.leaflet-control-zoom a:hover { background:var(--sf2) !important; }
.leaflet-control-attribution { background:rgba(240,240,235,.85) !important; color:#888 !important; font-size:9px; }
[data-theme="dark"] .leaflet-control-attribution { background:rgba(15,15,19,.8) !important; }
.leaflet-control-attribution a { color:#999 !important; }

/* 勤務地マーカー */
.base-wrap { position:relative; width:40px; height:40px; }
.base-pulse { position:absolute; top:-6px; left:-6px; width:52px; height:52px; border-radius:50%; background:rgba(232,147,90,.28); animation:bPulse 2.3s ease-out infinite; }
.base-pulse2 { animation-delay:1.15s; }
.base-core  { position:absolute; inset:0; border-radius:50%; background:var(--accent); border:3px solid #fff; box-shadow:0 3px 10px rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; font-size:18px; }
@keyframes bPulse { 0%{transform:scale(.7);opacity:.8;} 100%{transform:scale(2);opacity:0;} }

/* ポップアップ内 */
.pp-wrap  { padding:12px 14px 10px; min-width:180px; }
.pp-name  { font-size:14px; font-weight:700; margin-bottom:4px; color:var(--tx); }
.pp-genre { font-size:11px; color:var(--tx2); margin-bottom:6px; }
.pp-price { font-size:13px; font-weight:700; color:var(--accent); }
.pp-walk  { font-size:11px; color:var(--tx2); margin-top:3px; }
.pp-btn   { display:block; width:100%; margin-top:10px; padding:8px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:12px; font-weight:700; text-align:center; cursor:pointer; }
.pp-btn:hover { opacity:.85; }

/* 距離サークル（フィルター選択中） */
/* Google Maps InfoWindow */
.gm-style .gm-style-iw-c {
  background:var(--sf) !important; border-radius:12px !important;
  box-shadow:0 4px 20px var(--sh) !important; padding:0 !important; max-width:260px !important;
}
.gm-style .gm-style-iw-d { overflow:auto !important; padding:0 !important; max-height:none !important; }
.gm-style .gm-style-iw-t::after { background:var(--sf) !important; }
.gm-style-iw-chr { display:none !important; }
.gm-ui-hover-effect { display:none !important; }

/* ═══ モバイル ═══════════════════════════════ */
@media (max-width:768px) {
  .hd-title small { display:none; }
  .main { flex-direction:column; }
  #map { height:52vh; flex:none; }
  .sidebar { width:100%; flex:1; min-height:0; border-left:none; border-top:1px solid var(--bd); }
}
  </style>
</head>
<body>

<!-- Header -->
<header>
  <svg class="hd-logo" width="20" height="20" viewBox="0 0 24 24" fill="none">
    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#e8935a"/>
  </svg>
  <div class="hd-title">
    <h1>三田・田町 <span>マップ</span></h1>
    <small>新職場周辺ガイド</small>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="gourmet">🍜 グルメ</button>
    <button class="mode-btn" data-mode="shop">🛒 買い出し</button>
  </div>
  <span id="visibleCount"></span>
  <button class="icon-btn" id="settingsBtn" title="拠点設定">⚙️</button>
  <button class="icon-btn" id="themeBtn" title="テーマ切替">☀️</button>
</header>

<!-- フィルター -->
<div class="filter-area">
  <div class="filter-row" id="catFilterRow"></div>
  <div class="filter-row">
    <span class="filter-label">📍 半径</span>
    <button class="f-btn active" data-radius="0">すべて</button>
    <button class="f-btn" data-radius="300">300m</button>
    <button class="f-btn" data-radius="500">500m</button>
    <button class="f-btn" data-radius="800">800m</button>
    <button class="f-btn" data-radius="1000">1km</button>
  </div>
</div>

<!-- メイン -->
<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <!-- リストペイン -->
    <div class="sidebar-pane list-pane" id="listPane">
      <div class="pane-header">
        <strong id="paneTitle">全店舗</strong>
        <span id="paneSub"></span>
      </div>
      <div class="pane-scroll">
        <div class="card-list" id="cardList"></div>
      </div>
    </div>
    <!-- 詳細ペイン -->
    <div class="sidebar-pane detail-pane" id="detailPane">
      <div class="pane-header">
        <button class="icon-btn" id="backBtn" style="width:28px;height:28px;font-size:13px;flex-shrink:0">←</button>
        <strong id="detailPaneTitle" style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0"></strong>
        <button class="fav-btn" id="favBtn">♡</button>
      </div>
      <div class="pane-scroll" id="detailScroll">
        <img class="detail-photo" id="dPhoto" src="" alt="" onerror="this.style.display='none'">
        <div class="detail-body">
          <div class="detail-name" id="dName"></div>
          <div class="detail-meta">
            <span class="detail-genre" id="dGenre"></span>
            <span class="detail-price" id="dPrice"></span>
            <span class="detail-stars" id="dStars"></span>
          </div>
          <div class="sec-label">おすすめポイント</div>
          <div class="recommend-box" id="dRecommend"></div>
          <div class="sec-label">店舗情報</div>
          <div id="dInfoRows"></div>
          <div class="action-btns">
            <button class="act-btn act-btn-route" id="dRouteMapBtn">🗺️ ルートを表示</button>
            <button class="act-btn act-btn-secondary" id="dRecordBtn">✏️ 訪問を記録</button>

══════════════════════════════════════════ */
const LS_KEY  = 'mita_map_v1';
const LS_BASE = 'mita_base_v1';

function loadLS()  { try { return JSON.parse(localStorage.getItem(LS_KEY))  || {visits:{},favs:[]}; } catch{return {visits:{},favs:[]};} }
function saveLS(d) { localStorage.setItem(LS_KEY, JSON.stringify(d)); }

function loadBaseLS() {
  try {
    const b = JSON.parse(localStorage.getItem(LS_BASE));
    return b && b.lat ? b : null;
  } catch { return null; }
}
function saveBaseLS(b) { localStorage.setItem(LS_BASE, JSON.stringify(b)); }

function getVisits(id)  { return loadLS().visits[id] || []; }
function visitCount(id) { return getVisits(id).length; }
function isFav(id)      { return loadLS().favs.includes(id); }
function toggleFav(id)  { const d=loadLS(), i=d.favs.indexOf(id); i>=0?d.favs.splice(i,1):d.favs.push(id); saveLS(d); return i<0; }
function addVisit(id,e) { const d=loadLS(); if(!d.visits[id])d.visits[id]=[]; d.visits[id].unshift(e); saveLS(d); }
function delVisit(id,ts){ const d=loadLS(); if(d.visits[id])d.visits[id]=d.visits[id].filter(v=>v.ts!==ts); saveLS(d); }

/* ══════════════════════════════════════════
   距離計算
══════════════════════════════════════════ */
function haversineM(a,b,c,d) {
  const R=6371000,r=Math.PI/180,dL=(c-a)*r,dG=(d-b)*r;
  const x=Math.sin(dL/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function walkMin(s){ return Math.max(1,Math.ceil(haversineM(BASE.lat,BASE.lng,s.lat,s.lng)/80)); }
function currentData(){ return mode==='gourmet'?SPOTS:SHOPS; }

/* ══════════════════════════════════════════
   フィルター適用
══════════════════════════════════════════ */
function applyFilters(){
  const filtered = currentData().filter(s=>{
    const catOk  = filter==='all' || s.cat===filter;
    const distOk = radius===0 || haversineM(BASE.lat,BASE.lng,s.lat,s.lng)<=radius;
    return catOk && distOk;
  });
  renderCards(filtered);
  if(map) updateMarkers(filtered);
  updateDistCircle();
}

   カード描画
══════════════════════════════════════════ */
function renderCards(spots){
  const list=document.getElementById('cardList');
  list.innerHTML='';
  document.getElementById('visibleCount').textContent=spots.length+'件';
  document.getElementById('paneTitle').textContent=filter==='all'?(mode==='gourmet'?'全グルメ':'全買い出し先'):CAT_LABEL[filter];
  document.getElementById('paneSub').textContent=' — '+spots.length+'件';
  spots.forEach(s=>{
    const mins=walkMin(s), vc=visitCount(s.id), faved=isFav(s.id);
    const el=document.createElement('div');

        <div class="card-badges">
          ${vc>0?`<span class="visit-badge">${vc}回</span>`:''}
          <span class="fav-icon${faved?' on':''}">♥</span>
        </div>
      </div>
      <span class="card-genre-tag">${s.genre}</span>
      <div class="card-desc">${s.desc}</div>
      <div class="card-footer">
        <span class="price-tag">${s.price}</span>
        <span class="cat-badge ${s.cat}">${CAT_LABEL[s.cat]}</span>
        <span class="stars-sm">${'★'.repeat(s.stars)}${'☆'.repeat(5-s.stars)}</span>

══════════════════════════════════════════ */
function updateMarkers(vis){
  if(!map) return;
  const ids=new Set(vis.map(s=>s.id));
  Object.keys(markers).forEach(k=>{
    if(k==='base') return;
    const id=parseInt(k);
    if(!isNaN(id)) markers[id].setMap(ids.has(id)?map:null);
  });
}
function updateDistCircle(){
  if(!map) return;
  if(distCircle){distCircle.setMap(null);distCircle=null;}
  if(radius>0){
    distCircle=new google.maps.Circle({
      map, center:{lat:BASE.lat,lng:BASE.lng}, radius,
      strokeColor:'#e8935a', strokeWeight:2.5, strokeOpacity:1,
      fillColor:'#e8935a', fillOpacity:0.15, clickable:false, zIndex:1,
    });
  }
}

function onSelect(s){
  activeId=s.id;

    map.panTo({lat:s.lat,lng:s.lng});
    map.setZoom(17);
    Object.values(infoWindows).forEach(iw=>iw.close());
    infoWindows[s.id]?.open(map,markers[s.id]);
  }
  openDetail(s);
}

/* ══════════════════════════════════════════
   マップルーティング（OSRM + Google Maps Polyline）
══════════════════════════════════════════ */
function clearRoute(){
  if(routeLayer){routeLayer.setMap(null);routeLayer=null;}
  document.getElementById('routeInfo').textContent='';
  const btn=document.getElementById('dRouteMapBtn');
  if(btn){btn.className='act-btn act-btn-route';btn.textContent='🗺️ ルートを表示';}
}

async function toggleRoute(s){
  const btn=document.getElementById('dRouteMapBtn');
  if(routeLayer){ clearRoute(); return; }
  btn.textContent='⏳ 取得中…'; btn.disabled=true;
  try {
    const url=`https://router.project-osrm.org/route/v1/foot/${BASE.lng},${BASE.lat};${s.lng},${s.lat}?overview=full&geometries=geojson`;
    const res=await fetch(url);
    const data=await res.json();
    if(!data.routes||!data.routes[0]) throw new Error('no route');
    const leg=data.routes[0].legs[0];
    const dist=Math.round(leg.distance);
    const mins=Math.round(leg.duration/60);
    const path=data.routes[0].geometry.coordinates.map(([lng,lat])=>({lat,lng}));
    routeLayer=new google.maps.Polyline({
      path, map,
      strokeColor:'#e8935a', strokeWeight:5, strokeOpacity:0.85,
      icons:[{icon:{path:google.maps.SymbolPath.FORWARD_OPEN_ARROW,scale:3,strokeColor:'#e8935a'},offset:'100%',repeat:'80px'}],
    });
    const bounds=new google.maps.LatLngBounds();
    path.forEach(p=>bounds.extend(p));
    map.fitBounds(bounds,{padding:60});
    document.getElementById('routeInfo').textContent=`📏 ${dist}m・約${mins}分`;
    btn.className='act-btn act-btn-route active';
    btn.textContent='✕ ルートを消す';
  } catch(e){
    document.getElementById('routeInfo').textContent='ルートを取得できませんでした';
    btn.textContent='🗺️ ルートを表示';
  } finally { btn.disabled=false; }
}

function openSettingsModal(){

  document.getElementById('setCurrentCoord').textContent=`緯度: ${BASE.lat.toFixed(5)} / 経度: ${BASE.lng.toFixed(5)}`;
}
function applyBase(lat,lng,name){
  BASE={lat,lng,name};
  saveBaseLS(BASE);
  updateBaseStatus();
  refreshBaseMarker();
  applyFilters();
  if(map&&radius>0) map.setCenter({lat,lng});
}
function refreshBaseMarker(){
  if(markers['base']) markers['base'].setPosition({lat:BASE.lat,lng:BASE.lng});
  if(infoWindows['base']) infoWindows['base'].setContent(ppBaseHTML());
  // 徒歩時間を更新
  [...SPOTS,...SHOPS].forEach(s=>{
    if(infoWindows[s.id]) infoWindows[s.id].setContent(ppSpotHTML(s));
  });
  updateDistCircle();
  buildRefRings();
}
function ppBaseHTML(){ return `<div class="pp-wrap"><div class="pp-name">🏢 ${BASE.name}</div><div class="pp-genre" style="color:var(--accent)">ここが拠点です</div></div>`; }
function ppSpotHTML(s){ return `<div class="pp-wrap"><div class="pp-name">${s.name}</div><div class="pp-genre">${s.genre}</div><div class="pp-price">${s.price}</div><div class="pp-walk">🚶 拠点から約${walkMin(s)}分</div><button class="pp-btn" onclick="__sel(${s.id})">詳細を見る →</button></div>`; }
async function searchNominatim(){
  const q=document.getElementById('setSearch').value.trim();
  if(!q)return;
  const res_el=document.getElementById('setSearchResults');
  res_el.innerHTML='<div class="search-loading">検索中…</div>';
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=jp&limit=5&accept-language=ja`);
    const data=await res.json();
    if(!data.length){res_el.innerHTML='<div class="search-loading">見つかりませんでした</div>';return;}
    res_el.innerHTML='<div class="search-results">'+data.map((r,i)=>`
      <div class="sr-item" onclick="__pickLocation(${r.lat},${r.lon},'${(r.display_name||'').replace(/'/g,'&#39;').substring(0,40)}',${i})">
        <div class="sr-item-name">${(r.display_name||'').split(',')[0]}</div>
        <div class="sr-item-addr">${(r.display_name||'').substring(0,60)}</div>
      </div>`).join('')+'</div>';
  }catch{res_el.innerHTML='<div class="search-loading">検索に失敗しました</div>';}
}
window.__pickLocation=(lat,lng,name)=>{
  const n=document.getElementById('setName').value.trim()||name||'拠点';
  applyBase(parseFloat(lat),parseFloat(lng),n);
  closeSettingsModal();
  if(map) map.setCenter({lat:parseFloat(lat),lng:parseFloat(lng)});
};

document.getElementById('setGeoBtn').addEventListener('click',()=>{
  if(!navigator.geolocation){alert('位置情報が利用できません');return;}
  document.getElementById('setGeoBtn').textContent='📡 取得中…';
  navigator.geolocation.getCurrentPosition(pos=>{
    const name=document.getElementById('setName').value.trim()||'現在地';
    applyBase(pos.coords.latitude,pos.coords.longitude,name);
    document.getElementById('setGeoBtn').textContent='📍 現在地を拠点に設定';
    closeSettingsModal();
    if(map) map.setCenter({lat:pos.coords.latitude,lng:pos.coords.longitude});
  },()=>{
    alert('位置情報の取得に失敗しました');
    document.getElementById('setGeoBtn').textContent='📍 現在地を拠点に設定';
  });
});

/* ══════════════════════════════════════════
   地図初期化（Google Maps）
══════════════════════════════════════════ */
function buildRefRings(){
  if(!map) return;
  refRings.forEach(r=>r.setMap(null));
  refRings.length=0;
  const defs=[
    {r:500,  stroke:'#e8935a', fill:'rgba(232,147,90,.06)', label:'500m' },
    {r:1000, stroke:'#a855f7', fill:'rgba(168,85,247,.06)', label:'1km'  },
    {r:1500, stroke:'#06b6d4', fill:'rgba(6,182,212,.06)',  label:'1.5km'},
  ];
  const tinyIcon={url:'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7',scaledSize:new google.maps.Size(1,1)};
  defs.forEach(d=>{
    const circle=new google.maps.Circle({
      map, center:{lat:BASE.lat,lng:BASE.lng}, radius:d.r,
      strokeColor:d.stroke, strokeWeight:1.5, strokeOpacity:0.7,
      fillColor:d.stroke, fillOpacity:0.05, clickable:false, zIndex:0,
    });
    const labelLat=BASE.lat+(d.r/111320);
    const lbl=new google.maps.Marker({
      position:{lat:labelLat,lng:BASE.lng}, map,
      label:{text:d.label, color:isDark?'#bbb':'#555', fontSize:'10px', fontWeight:'bold'},
      icon:tinyIcon, clickable:false, zIndex:0,
    });
    refRings.push(circle,lbl);
  });
}

window.initMap=function(){
  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:BASE.lat,lng:BASE.lng}, zoom:16,
    styles:GM_STYLE.light,
    mapTypeControl:false, streetViewControl:false, fullscreenControl:false,
    zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_BOTTOM},
  });
  // 拠点マーカー
  const baseSVG=encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44"><circle cx="22" cy="22" r="19" fill="#e8935a" stroke="white" stroke-width="3"/><text x="22" y="29" text-anchor="middle" font-size="22" font-family="sans-serif">🏢</text></svg>`);
  markers['base']=new google.maps.Marker({
    position:{lat:BASE.lat,lng:BASE.lng}, map,
    icon:{url:`data:image/svg+xml;charset=UTF-8,${baseSVG}`,scaledSize:new google.maps.Size(44,44),anchor:new google.maps.Point(22,22)},
    title:BASE.name, zIndex:1000,
  });
  infoWindows['base']=new google.maps.InfoWindow({content:ppBaseHTML()});
  markers['base'].addListener('click',()=>{ Object.values(infoWindows).forEach(iw=>iw.close()); infoWindows['base'].open(map,markers['base']); });
  buildSpotMarkers(SPOTS);
  buildSpotMarkers(SHOPS);
  SHOPS.forEach(s=>markers[s.id].setMap(null));
  buildRefRings();
  applyFilters();
};

function buildSpotMarkers(data){
  data.forEach(s=>{
    const marker=new google.maps.Marker({
      position:{lat:s.lat,lng:s.lng}, map,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:CAT_COLOR[s.cat],fillOpacity:.9,strokeColor:'#fff',strokeWeight:2},
      title:s.name,
    });
    const iw=new google.maps.InfoWindow({content:ppSpotHTML(s),maxWidth:240});
    marker.addListener('click',()=>{
      Object.values(infoWindows).forEach(w=>w.close());
      iw.open(map,marker);
      const card=document.querySelector(`.card[data-id="${s.id}"]`);
      if(card){document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));card.classList.add('active');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
    });
    markers[s.id]=marker;
    infoWindows[s.id]=iw;
  });
}

function rebuildModeMarkers(){
  if(!map) return;
  SPOTS.forEach(s=>markers[s.id]?.setMap(null));
  SHOPS.forEach(s=>markers[s.id]?.setMap(null));
  currentData().forEach(s=>markers[s.id]?.setMap(map));
}

/* ══════════════════════════════════════════
   起動
══════════════════════════════════════════ */
buildCatFilter();
// initMap は Google Maps API ロード完了後にコールバックで呼ばれる
</script>
